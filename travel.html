    <!-- Application Structure Plan: 
         Designed as a mobile-first, app-like SPA. 
         1. Header: Quick context (Dates, Title).
         2. Dashboard Overview: A visual summary of the trip using Chart.js to show activity distribution, providing immediate context.
         3. Interactive Itinerary: A horizontal scrollable day selector acting as sub-navigation.
         4. Dynamic Timeline: The core functional area. Clicking a day loads a vertical timeline of events. This structure is chosen because travel is inherently sequential. The timeline visually separates time, location, transportation, and dining, making it easy to read on the go.
         5. Actionable Nodes: Each timeline item contains direct Google Maps links for navigation and places, fulfilling the "high-utility" requirement.
    -->
    <!-- Visualization & Content Choices: 
         1. Trip Breakdown -> Goal: Inform -> Donut Chart (Chart.js) -> Hover interaction -> Shows balance of activities -> Canvas/Chart.js.
         2. Daily Schedule -> Goal: Organize & Sequence -> Vertical Timeline (HTML/Tailwind) -> Click days to change -> Best for chronological travel data -> HTML/JS.
         3. Categories -> Goal: Quick recognition -> Emojis (🏛️,🍽️,🚆,🏨) & Color Coding -> Visual grouping without SVGs.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <style>

        }

            scrollbar-width: none;
        }

            height: 250px;
            max-height: 300px;

            top: 0;
            bottom: 0;

        // --- 2. Chart.js Initialization ---
        function initChart() {
            // Count activity types for the chart
            let counts = { transport: 0, attraction: 0, food: 0, hotel: 0 };
            itineraryData.forEach(day => {
                day.events.forEach(event => {
                    if(counts[event.type] !== undefined) counts[event.type]++;
                });
            });

            const ctx = document.getElementById('overviewChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['交通移動 🚆', '景點活動 🏛️', '餐飲美食 🍽️', '住宿/其他 🏨'],
                    datasets: [{
                        data: [counts.transport, counts.attraction, counts.food, counts.hotel + 2], // +2 for flight events
                        backgroundColor: [
                            '#DBEAFE', // blue-100
                            '#CCFBF1', // teal-100
                            '#FFEDD5', // orange-100
                            '#F3E8FF'  // purple-100
                        ],
                        borderColor: [
                            '#2563EB', // blue-600
                            '#0D9488', // teal-600
                            '#EA580C', // orange-600
                            '#9333EA'  // purple-600
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { font: { family: "'Noto Sans TC', sans-serif" } } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ' ' + context.label.split(' ')[0] + ': ' + context.raw + ' 項';
                                }
                            }
                        }
                    },
                    cutout: '65%'
                }
            });
        }

        // --- 3. UI Rendering Logic ---
        let activeDayIndex = 0;

        function renderDayNav() {
            const navContainer = document.getElementById('day-nav');
            navContainer.innerHTML = '';
            
            itineraryData.forEach((day, index) => {
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 px-4 py-2 rounded-full text-sm font-bold transition-colors duration-200 border ${
                    index === activeDayIndex 
                    ? 'bg-slate-800 text-white border-slate-800 shadow-md' 
                    : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100'
                }`;
                btn.innerHTML = `Day ${day.day}`;
                btn.onclick = () => {
                    activeDayIndex = index;
                    renderDayNav(); // Update active state
                    renderDayContent(index);
                    // Center the clicked button
                    btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                };
                navContainer.appendChild(btn);
            });
        }

        function renderDayContent(index) {
            const contentContainer = document.getElementById('day-content');
            const dayData = itineraryData[index];
            
            let html = `
                <div class="mb-6 animate-fade-in">
                    <h3 class="text-xl font-bold text-slate-800 mb-1 flex items-center">
                        <span class="bg-slate-100 text-slate-700 px-2 py-1 rounded text-sm mr-2">${dayData.date}</span>
                        ${dayData.title}
                    </h3>
                </div>
                <div class="relative timeline-line pl-5 pb-8">
            `;

            dayData.events.forEach((event, i) => {
                // Determine if it's the last item to remove the trailing line visually if needed
                const isLast = i === dayData.events.length - 1;
                
                html += `
                    <div class="relative mb-8 ${isLast ? '' : ''} animate-slide-up" style="animation-delay: ${i * 0.05}s">
                        <!-- Icon Dot -->
                        <div class="absolute -left-[1.8rem] w-8 h-8 rounded-full ${event.color} border-4 border-white flex items-center justify-center text-sm shadow-sm z-10">
                            ${event.icon}
                        </div>
                        
                        <!-- Content Card -->
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 ml-2">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <span class="text-xs font-bold text-slate-400 block mb-1">${event.time} ${event.duration !== '-' ? `(約 ${event.duration})` : ''}</span>
                                    <h4 class="font-bold text-base text-slate-800">${event.title}</h4>
                                </div>
                            </div>
                            
                            <p class="text-sm text-slate-600 mb-3 leading-relaxed">
                                ${event.desc}
                            </p>
                            
                            <!-- Action Buttons -->
                            <div class="flex flex-wrap gap-2 mt-2">
                                ${event.routeLink ? `
                                    <a href="${event.routeLink}" target="_blank" class="inline-flex items-center text-xs bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg font-medium hover:bg-blue-100 transition">
                                        <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                                        路線導航
                                    </a>
                                ` : ''}
                                ${event.link ? `
                                    <a href="${event.link}" target="_blank" class="inline-flex items-center text-xs bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg font-medium hover:bg-slate-200 transition">
                                        <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        Google地圖
                                    </a>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            contentContainer.innerHTML = html;
        }

        // Add some basic CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
            .animate-slide-up { animation: slideUp 0.4s ease-out forwards; opacity: 0; }
        `;
        document.head.appendChild(style);

        // --- 4. Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            renderDayNav();
            renderDayContent(0);
        });

    </script>
